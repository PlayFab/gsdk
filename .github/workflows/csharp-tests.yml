name: C# GSDK Tests

on:
  pull_request:
    paths:
      - 'csharp/**'
      - '.github/workflows/csharp-tests.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Build
        run: dotnet build csharp/GSDK_CSharp_Standard.sln

      - name: Test
        run: dotnet test csharp/Tests/Tests.csproj
